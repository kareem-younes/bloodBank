<form (ngSubmit)="login(emailVal,passwordVal) ">
    <div class="heading">
      <h3>Welcom Back</h3>
      <p>Sign in to your account to continue saving lives</p>
    </div>

    <label for="email">Email Adress</label>
    <input [(ngModel)]="emailVal" required placeholder="Enter Your Email" type="email" name="email" id="email">
    <label for="password">Password</label>
    <div class="password-holder">
      <input [(ngModel)]="passwordVal" required placeholder="Enter Your Password" [type]="passwordHide ? 'password' : 'text'" name="password" id="password">
      <div (click)="hidePassword()" class="hide cursor-pointer">
        <svg [ngClass]="passwordHide ? 'hidden' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-eye h-4 w-4 text-gray-800 hover:text-primary transition-colors">
          <path
            d="M2.062 12.348a1 1 0 0 1 0-.696A10.75 10.75 0 0 1 21.938 12a1 1 0 0 1 0 .696A10.75 10.75 0 0 1 2.062 12.348Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>

        <svg [ngClass]="!passwordHide ? 'hidden' : ''" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-eye-off h-4 w-4 text-gray-800 hover:text-primary transition-colors">
          <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
          <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
          <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
          <path d="m2 2 20 20" />
        </svg>
    </div>


    </div>


    <div class="actions">
      <div>
        <input [(ngModel)]="rememberPass" type="checkbox" name="remember" id="remember">
        <label for="remember">Remember Me</label>
      </div>
      <a routerLink="forget-password">Forget Password</a>
    </div>
    <p class="error">{{errorMsg}}</p>
    <input type="submit" value="Sign In">
    <p>Don't have an account? <a routerLink="/signup">Sign up here</a></p>
</form>
