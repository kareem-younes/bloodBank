<div class="search-box">
  <div class="search main-input">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#73808C"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      class="lucide lucide-search absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 text-muted-foreground">
      <circle cx="11" cy="11" r="8" fill="none" />
      <path d="m21 21-4.3-4.3" fill="none" />
    </svg>
    <input (input)="sendSearchInput(searchInput.value)" #searchInput placeholder="Search Hospitals Or Locations" type="search">
  </div>
  <div class="toggles">
    <label (click)="emitOut()" (click)="listMapChecked = true" [ngClass]="listMapChecked ? 'selectedCheck' : 'notSelectdCheck'" for="listView">
      <input class="hidden" type="checkbox" name="listView" id="mapView">
      <svg [ngClass]="listMapChecked ? 'selectedCheckSvg' : 'notSelectdCheckSvg'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin h-4 w-4">
        <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" />
        <circle cx="12" cy="10" r="3" />
      </svg>
      <span>List View</span>
    </label>
    <label (click)="emitOut()" (click)="listMapChecked = false" [ngClass]="!listMapChecked ? 'selectedCheck' : 'notSelectdCheck'" for="mapView">
      <input class="hidden" type="checkbox" name="mapView" id="mapView">
      <svg [ngClass]="!listMapChecked ? 'selectedCheckSvg' : 'notSelectdCheckSvg'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22262A"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z">
        </path>
        <path d="M15 5.764v15"></path>
        <path d="M9 3.236v15"></path>
      </svg>
      <span>Map View</span>
    </label>
  </div>
</div>
